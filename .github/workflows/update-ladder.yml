name: Update AFL ladder

on:
  workflow_dispatch:
    inputs:
      round_number:
        description: 'Round number (1–27)'
        required: true
        type: number

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ladder and update store
        env:
          ROUND_NUMBER: ${{ inputs.round_number }}
        run: |
          python3 << 'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime
          from pathlib import Path

          round_number = int(os.environ["ROUND_NUMBER"])
          url = "https://aflapi.afl.com.au/afl/v2/compseasons/85/ladders"
          with urllib.request.urlopen(url, timeout=30) as resp:
              data = json.load(resp)
          entries = data["ladders"][0]["entries"]
          ladder = sorted(
              [{"position": e["position"], "team": e["team"]["name"]} for e in entries],
              key=lambda x: x["position"],
          )

          store_path = Path("data/store.json")
          store = json.loads(store_path.read_text(encoding="utf-8"))
          entry = {
              "round_number": round_number,
              "fetched_at": datetime.now().strftime("%Y-%m-%d %H:%M"),
              "ladder_json": json.dumps(ladder),
          }
          rounds = [r for r in store.get("rounds", []) if r["round_number"] != round_number]
          rounds.append(entry)
          store["rounds"] = sorted(rounds, key=lambda r: r["round_number"])
          store_path.write_text(json.dumps(store, indent=2), encoding="utf-8")
          print(f"Updated round {round_number} ({len(ladder)} teams)")
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/store.json
          git diff --staged --quiet || git commit -m "Update ladder for round ${{ inputs.round_number }}"
          git push
